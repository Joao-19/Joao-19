<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <style>
    /*
      Cascata por coluna, direita → esquerda.
      Dentro de cada coluna, os shapes acendem de cima para baixo.
      Aparece rápido (4%), fica visível (31%), some devagar (35%), escuro (30%).

      Col E (x≈175): shape01 → shape0111 → shape05   dur 3.0s  col-delay 0.0s
      Col D (x≈151): shape011 → shape013 → shape06   dur 2.7s  col-delay 0.5s
      Col C (x≈130): shape014 → shape04  → shape010  dur 3.3s  col-delay 1.0s
      Col B (x≈105): shape07  → shape08  → shape012  dur 2.9s  col-delay 1.5s
      Col A (x≈78):  shape02  → shape03  → shape09   dur 3.1s  col-delay 2.0s

      Row cascade dentro da coluna: +0.2s por fileira
    */

    @keyframes drop {
      0%   { opacity: 0; }
      4%   { opacity: 1; }
      35%  { opacity: 1; }
      70%  { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Col E — dur 3.0s */
    #shape01   { animation: drop 3.0s linear 0.0s infinite; }
    #shape0111 { animation: drop 3.0s linear 0.2s infinite; }
    #shape05   { animation: drop 3.0s linear 0.4s infinite; }

    /* Col D — dur 2.7s */
    #shape011  { animation: drop 2.7s linear 0.5s infinite; }
    #shape013  { animation: drop 2.7s linear 0.7s infinite; }
    #shape06   { animation: drop 2.7s linear 0.9s infinite; }

    /* Col C — dur 3.3s */
    #shape014  { animation: drop 3.3s linear 1.0s infinite; }
    #shape04   { animation: drop 3.3s linear 1.2s infinite; }
    #shape010  { animation: drop 3.3s linear 1.4s infinite; }

    /* Col B — dur 2.9s */
    #shape07   { animation: drop 2.9s linear 1.5s infinite; }
    #shape08   { animation: drop 2.9s linear 1.7s infinite; }
    #shape012  { animation: drop 2.9s linear 1.9s infinite; }

    /* Col A — dur 3.1s */
    #shape02   { animation: drop 3.1s linear 2.0s infinite; }
    #shape03   { animation: drop 3.1s linear 2.2s infinite; }
    #shape09   { animation: drop 3.1s linear 2.4s infinite; }
  </style>
